name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: abaconnect
          POSTGRES_PASSWORD: abaconnect
          POSTGRES_DB: abaconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Migrate
        env:
          DATABASE_URL: postgresql://abaconnect:abaconnect@localhost:5432/abaconnect_test
        run: npx prisma migrate deploy
      - run: npm run lint --if-present
      - run: npm run build
      - run: npm test -- --passWithNoTests
      - name: Seed demo data
        env:
          DATABASE_URL: postgresql://abaconnect:abaconnect@localhost:5432/abaconnect_test
        run: npm run prisma:seed
      - name: E2E tests
        env:
          DATABASE_URL: postgresql://abaconnect:abaconnect@localhost:5432/abaconnect_test
          JWT_SECRET: ci-test-jwt-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          JWT_RESET_SECRET: ci-test-reset-secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: npm run test:e2e
      - name: Smoke features
        env:
          DATABASE_URL: postgresql://abaconnect:abaconnect@localhost:5432/abaconnect_test
          JWT_SECRET: ci-test-jwt-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          JWT_RESET_SECRET: ci-test-reset-secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          npm run start:prod &
          API_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/v1/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:3000/api/v1/health
          cd ..
          bash scripts/smoke-features.sh
          kill "$API_PID"
      - name: Security audit
        run: npm audit --audit-level=high || true

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
      - run: flutter build web --release
