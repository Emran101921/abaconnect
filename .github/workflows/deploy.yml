name: Deploy

on:
  workflow_dispatch:
    inputs:
      run_migrate:
        description: 'Run prisma migrate deploy in CI check only'
        required: false
        default: true
        type: boolean

jobs:
  build-api-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t abaconnect-api:${{ github.sha }} ./api

      - name: Verify image starts (smoke)
        run: |
          docker run --rm abaconnect-api:${{ github.sha }} node -e "console.log('ok')"

  migrate-check:
    runs-on: ubuntu-latest
    if: inputs.run_migrate
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: abaconnect
          POSTGRES_PASSWORD: abaconnect
          POSTGRES_DB: abaconnect
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Apply all migrations
        env:
          DATABASE_URL: postgresql://abaconnect:abaconnect@localhost:5432/abaconnect
        run: npx prisma migrate deploy
